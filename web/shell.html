<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zequence</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Trebuchet MS", "Avenir Next", sans-serif;
      --panel: rgba(13, 18, 26, 0.82);
      --edge: rgba(140, 170, 205, 0.35);
      --ink: #ebf1f8;
      --muted: rgba(219, 229, 241, 0.74);
      background:
        radial-gradient(1200px 700px at 15% 10%, #21334e 0%, rgba(33, 51, 78, 0.18) 45%, transparent 70%),
        radial-gradient(900px 600px at 85% 0%, #3f1f44 0%, rgba(63, 31, 68, 0.08) 42%, transparent 70%),
        linear-gradient(145deg, #090f18 0%, #121b27 50%, #0d1420 100%);
      color: var(--ink);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 12px;
      box-sizing: border-box;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 11px;
      border: 1px solid var(--edge);
      background: var(--panel);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(3px);
      font-size: 14px;
    }
    .muted {
      color: var(--muted);
    }
    #canvas {
      width: min(100%, 1440px);
      height: auto;
      min-height: 68vh;
      justify-self: center;
      align-self: start;
      display: block;
      border-radius: 12px;
      border: 1px solid var(--edge);
      background: #0b1119;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <header>
    <div><strong>Zequence</strong></div>
    <div class="muted">Click Play to start audio. Space toggles transport, R randomizes pattern.</div>
  </header>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  {{{ SCRIPT }}}
</body>
</html>
